fusioncore:
  ros__parameters:
    base_frame: base_link
    odom_frame: odom
    publish_rate: 100.0

    # Noise values match the Gazebo model (model.sdf):
    #   gyro  stddev = 0.003 rad/s
    #   accel stddev = 0.050 m/s²
    imu.gyro_noise: 0.003
    imu.accel_noise: 0.05
    imu.has_magnetometer: false

    encoder.vel_noise: 0.05
    encoder.yaw_noise: 0.02

    gnss.base_noise_xy: 1.0   # baseline sigma (m) at HDOP=1. When NavSatFix provides
                               # covariance, fusion_node sets fix.hdop = sqrt(var_xy),
                               # so sigma = base_noise_xy * sqrt(var_xy). With base=1.0
                               # this equals sqrt(var_xy) directly: the correct value.
                               # Do NOT set this to NOISE_H; that double-shrinks R.
    gnss.base_noise_z: 1.0    # same reasoning for vertical: set to 1.0, not NOISE_V
    gnss.max_hdop: 4.0
    gnss.min_satellites: 4
    gnss.heading_topic: ""

    outlier_rejection: true
    outlier_threshold_gnss: 16.27   # chi2(3, 0.999) — always on, no config required

    zupt.enabled: true              # zero-velocity updates: suppresses IMU drift at standstill
    zupt.velocity_threshold: 0.05
    zupt.angular_threshold: 0.05
    zupt.noise_sigma: 0.01

    adaptive.imu: true
    adaptive.encoder: true
    adaptive.gnss: true
