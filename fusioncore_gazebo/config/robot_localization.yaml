# robot_localization EKF config for the FusionCore comparison demo.
# Intentionally uses NO outlier rejection so that the GPS spike at t=60s
# visibly pulls the estimate off course, demonstrating why chi-squared
# gating matters.

ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: false
    publish_tf: false          # FusionCore owns TF; RL runs side-by-side only
    map_frame: map
    odom_frame: rl_odom
    base_link_frame: base_link
    world_frame: rl_odom
    print_diagnostics: false

    odom0: /odom/wheels
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 5
    odom0_differential: false
    odom0_relative: false

    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]
    imu0_queue_size: 10
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

    pose0: /rl/odometry/gps
    pose0_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    pose0_queue_size: 5
    pose0_differential: false
    pose0_relative: false

navsat_transform:
  ros__parameters:
    frequency: 10.0
    delay: 3.0
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_utm_transform: false
    publish_filtered_gps: false
    use_odometry_yaw: false
    wait_for_datum: true
    datum: [43.2557, -79.8711, 0.0]
