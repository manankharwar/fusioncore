name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Register ROS Python packages in system site-packages
        run: |
          ROS_PYPATH=/opt/ros/jazzy/lib/python3.12/site-packages
          SITE=$(python3 -c "import site; print(site.getsitepackages()[0])")
          echo "$ROS_PYPATH" | sudo tee "$SITE/ros_jazzy.pth"
          echo "PYTHONPATH=$ROS_PYPATH" >> $GITHUB_ENV

      - uses: ros-tooling/action-ros-ci@v0.3
        with:
          target-ros2-distro: jazzy
          package-name: |
            compass_msgs
            fusioncore_core
            fusioncore_ros
