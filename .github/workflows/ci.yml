name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Export ROS Python path
        run: source /opt/ros/jazzy/setup.sh && echo "PYTHONPATH=${PYTHONPATH}" >> $GITHUB_ENV

      - uses: ros-tooling/action-ros-ci@v0.3
        with:
          target-ros2-distro: jazzy
          package-name: |
            compass_msgs
            fusioncore_core
            fusioncore_ros
