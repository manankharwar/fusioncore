name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - uses: ros-tooling/action-ros-ci@v0.3
        with:
          package-name: |
            compass_msgs
            fusioncore_core
            fusioncore_ros
