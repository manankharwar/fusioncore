# Basic differential drive robot
# IMU + wheel encoders only, no GNSS

base_frame: base_link
odom_frame: odom
publish_rate: 100.0

imu:
  gyro_noise: 0.005
  accel_noise: 0.1

encoder:
  vel_noise: 0.05
  yaw_noise: 0.02

gnss:
  base_noise_xy: 1.0
  base_noise_z: 2.0
  heading_noise: 0.02
  max_hdop: 4.0
  min_satellites: 4

ukf:
  q_position: 0.01
  q_orientation: 0.01
  q_velocity: 0.1
  q_angular_vel: 0.1
  q_acceleration: 1.0
  q_gyro_bias: 1.0e-5
  q_accel_bias: 1.0e-5
